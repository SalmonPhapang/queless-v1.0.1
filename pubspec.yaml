name: queless
description: "Queless is your go-to app for instant, legally compliant alcohol and beverage delivery across South Africa, bringing the party to your doorstep with seamless ordering and real-time tracking."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.0.0
  geolocator: ^9.0.2
  geocoding: ^2.1.1
  intl: 0.20.2
  uuid: ^4.0.0
  supabase_flutter: '>=1.10.0'
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_ozow: any
  paystack_for_flutter: any
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_logo.png
  remove_alpha_ios: true
